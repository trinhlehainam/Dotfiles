name: Claude PR Assistant

# =============================================================================
# Uses Z.ai's Anthropic-compatible endpoint for Claude Code Action
#
# Setup:
# 1. Get API key: https://z.ai/manage-apikey/apikey-list
# 2. Add GitHub secret: ZAI_API_KEY
# 3. Optional: adjust model mapping here as Z.ai updates supported coding models
#
# Docs:
# - https://docs.z.ai/devpack/tool/claude
# - https://docs.z.ai/devpack/using5.1
# - https://github.com/anthropics/claude-code-action
# =============================================================================
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude PR Action
        uses: anthropics/claude-code-action@v1
        with:
          # Use z.ai API key instead of Claude Code OAuth token
          anthropic_api_key: ${{ secrets.ZAI_API_KEY }}
          claude_args: |
            --allowedTools "Bash(bun install),Bash(bun test:*),Bash(bun run format),Bash(bun typecheck)"
        env:
          # Point to z.ai's Anthropic-compatible endpoint
          ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
          # Override Claude Code's default model mapping to Z.ai's latest coding-agent guide
          ANTHROPIC_DEFAULT_HAIKU_MODEL: glm-4.5-air
          ANTHROPIC_DEFAULT_SONNET_MODEL: glm-5.1
          ANTHROPIC_DEFAULT_OPUS_MODEL: glm-5.1
